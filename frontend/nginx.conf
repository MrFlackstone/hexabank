# Nginx del frontend: sirve el SPA estatico y hace de reverse-proxy hacia los microservicios.
# Todo cuelga de /api, asi que el navegador ve un unico origen -> no hace falta CORS.
# Los nombres account-service / transfer-service / ledger-service resuelven por la red de compose.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- SPA: cualquier ruta desconocida cae en index.html (history routing del cliente) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- account-service: /api/accounts/... -> /accounts/... ---
    location /api/accounts {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://account-service:8081;
        proxy_set_header Host $host;
    }

    # --- transfer-service (orquestador): /api/transfers/... -> /transfers/... ---
    location /api/transfers {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://transfer-service:8082;
        proxy_set_header Host $host;
    }

    # --- ledger-service, proyeccion CQRS: /api/projections/transfers/X -> /transfers/X ---
    # Prefijo propio para desambiguar la colision de path con el orquestador.
    location /api/projections/transfers {
        rewrite ^/api/projections/(.*)$ /$1 break;
        proxy_pass http://ledger-service:8083;
        proxy_set_header Host $host;
    }

    # --- ledger-service, feed en vivo por SSE: requiere streaming sin buffer ---
    location /api/ledger/stream {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://ledger-service:8083;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # --- ledger-service, consultas REST: /api/ledger -> /ledger ---
    location /api/ledger {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://ledger-service:8083;
        proxy_set_header Host $host;
    }
}

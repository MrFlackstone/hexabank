# HexaBank — infraestructura base (Fase 0)
# Levanta el plano de comunicacion (Kafka en modo KRaft) y la persistencia base (Postgres).
# Los microservicios y sus DB dedicadas se anaden en sus fases.
# Arrancar:  docker compose up -d      Parar+limpiar:  docker compose down -v

name: hexabank

services:
  # --- Kafka en modo KRaft (sin Zookeeper): el propio broker hace de controller. ---
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "29092:29092"   # listener EXTERNAL para clientes en el host (localhost:29092)
    environment:
      # Roles combinados: este unico nodo es broker y controller a la vez.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Tres listeners: interno (red docker), controller (quorum KRaft) y externo (host).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Un solo broker -> factores de replicacion = 1 (en produccion serian >=3).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- UI web para inspeccionar topics, particiones y consumer-groups en la demo. ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: hexabank-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Postgres dedicado de account-service (DB-per-service). ---
  # Cada microservicio posee su propia base de datos: sin acoplamiento por BD compartida.
  # Bloque de puertos host 544x (account=5442, transfer=5443, ledger=5444): evita el
  # PostgreSQL nativo de Windows que ocupa el 5432. Dentro del contenedor sigue siendo 5432.
  postgres-account:
    image: postgres:16-alpine
    container_name: postgres-account
    ports:
      - "5442:5432"
    environment:
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
      POSTGRES_DB: accountdb
    volumes:
      - postgres-account-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexabank -d accountdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Postgres dedicado de transfer-service (DB-per-service). ---
  postgres-transfer:
    image: postgres:16-alpine
    container_name: postgres-transfer
    ports:
      - "5443:5432"
    environment:
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
      POSTGRES_DB: transferdb
    volumes:
      - postgres-transfer-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexabank -d transferdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Postgres dedicado de ledger-service (DB-per-service). ---
  postgres-ledger:
    image: postgres:16-alpine
    container_name: postgres-ledger
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
      POSTGRES_DB: ledgerdb
    volumes:
      - postgres-ledger-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexabank -d ledgerdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Microservicios (cada uno hexagonal). Se construyen desde la raiz del repo (multi-modulo).
  # No se tocan los application.yml: los valores de localhost se sobreescriben por env aprovechando
  # el relaxed binding de Spring (SPRING_DATASOURCE_URL / SPRING_KAFKA_BOOTSTRAP_SERVERS). Dentro de
  # la red de compose los hosts son los nombres de servicio (kafka, postgres-*) y el puerto interno. ---
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-account:5432/accountdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      postgres-account:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - hexabank-net
    restart: unless-stopped

  transfer-service:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    container_name: transfer-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-transfer:5432/transferdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      postgres-transfer:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - hexabank-net
    restart: unless-stopped

  ledger-service:
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: ledger-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ledger:5432/ledgerdb
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      postgres-ledger:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Postgres dedicado de Keycloak. El IdP persiste realms/usuarios/clientes aqui, de
  # modo que el estado sobrevive a reinicios (modo produccion, no memoria efimera). ---
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    ports:
      - "5445:5432"
    environment:
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
      POSTGRES_DB: keycloakdb
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexabank -d keycloakdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Keycloak como Identity Provider OIDC. Modo produccion ('start') con Postgres
  # dedicado; importa el realm 'hexabank' (realm-as-code) en el arranque. Emite los access token (JWT
  # Bearer) que los 3 servicios validan como OAuth2 Resource Server. KC_HTTP_ENABLED + HOSTNAME_STRICT
  # =false permiten HTTP sin TLS dentro de la red interna (una demo local; en produccion real: TLS +
  # hostname fijo). Consola admin: http://localhost:8180 (admin/admin). ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloakdb
      KC_DB_USERNAME: hexabank
      KC_DB_PASSWORD: hexabank
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/realm-hexabank.json:/opt/keycloak/data/import/realm-hexabank.json:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Frontend React servido por Nginx, que ademas hace de reverse-proxy /api hacia los
  # microservicios (origen unico, sin CORS). Punto de entrada de la demo: http://localhost:3000 ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - account-service
      - transfer-service
      - ledger-service
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Observabilidad (Fase 5). Prometheus raspa /actuator/prometheus de los 3 servicios (modelo
  # pull) y Grafana los visualiza. Provisioning automatico de datasource + dashboard. ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"   # solo loopback: Grafana lo alcanza por la red interna
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - account-service
      - transfer-service
      - ledger-service
    networks:
      - hexabank-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3001:3000"   # solo loopback (el frontend ocupa el host 3000)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"   # demo sin login: solo lectura
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer  # el acceso anónimo es de solo lectura
      GF_AUTH_DISABLE_LOGIN_FORM: "true"  # el formulario de login admin no es alcanzable
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - hexabank-net
    restart: unless-stopped

networks:
  hexabank-net:
    driver: bridge

volumes:
  kafka-data:
  postgres-account-data:
  postgres-transfer-data:
  postgres-ledger-data:
  postgres-keycloak-data:
  grafana-data:

# HexaBank — infraestructura base (Fase 0)
# Levanta el plano de comunicacion (Kafka en modo KRaft) y la persistencia base (Postgres).
# Los microservicios y sus DB dedicadas se anaden en sus fases.
# Arrancar:  docker compose up -d      Parar+limpiar:  docker compose down -v

name: hexabank

services:
  # --- Kafka en modo KRaft (sin Zookeeper): el propio broker hace de controller. ---
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "29092:29092"   # listener EXTERNAL para clientes en el host (localhost:29092)
    environment:
      # Roles combinados: este unico nodo es broker y controller a la vez.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Tres listeners: interno (red docker), controller (quorum KRaft) y externo (host).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Un solo broker -> factores de replicacion = 1 (en produccion serian >=3).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- UI web para inspeccionar topics, particiones y consumer-groups en la demo. ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: hexabank-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hexabank-net
    restart: unless-stopped

  # --- Postgres base. Cada servicio usara su propia DB logica en su fase. ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
      POSTGRES_DB: hexabank
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexabank -d hexabank"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - hexabank-net
    restart: unless-stopped

networks:
  hexabank-net:
    driver: bridge

volumes:
  kafka-data:
  postgres-data:

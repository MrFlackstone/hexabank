spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:postgresql://localhost:5443/transferdb
    username: hexabank
    password: hexabank
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: transfer-service

server:
  port: 8082

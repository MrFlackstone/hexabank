# Provider de dashboards: carga los JSON de la carpeta montada al arrancar Grafana.
apiVersion: 1

providers:
  - name: HexaBank
    orgId: 1
    folder: HexaBank
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

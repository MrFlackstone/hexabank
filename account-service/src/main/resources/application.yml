spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5442/accountdb
    username: hexabank
    password: hexabank
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: account-service
  # Valida los Bearer JWT emitidos por Keycloak. issuer-uri = URL interna de la red
  # Docker; en arranque local sin Docker, sobreescribe por env/-D (p. ej. http://localhost:8180/...).
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/hexabank

server:
  port: 8081

# Observabilidad: Actuator expone los endpoints de gestion; Micrometer publica las metricas en
# formato Prometheus en /actuator/prometheus (modelo pull: Prometheus las raspa cada pocos segundos).
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}   # etiqueta comun para filtrar por servicio en Grafana
    distribution:
      percentiles-histogram:
        http.server.requests: true              # habilita histogramas -> latencia/quantiles
  prometheus:
    metrics:
      export:
        enabled: true
